<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e4e0d8;
    --text: #1a1814;
    --muted: #9e9a90;
    --accent: #6355e8;
    --accent2: #e8557a;
    --accent3: #2ec98a;
    --accent4: #e8a830;
    --success: #2ec98a;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .app-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .month-nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .month-nav button:hover { background: var(--accent); border-color: var(--accent); }
  .month-label {
    font-size: 18px;
    font-weight: 700;
    min-width: 90px;
    text-align: center;
    letter-spacing: 1px;
  }

  /* Category tabs */
  .category-section { margin-bottom: 20px; }
  .category-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .add-category-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .add-category-btn:hover { border-color: var(--accent); color: var(--accent); }

  .category-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .cat-tab {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 500;
    position: relative;
  }
  .cat-tab.active {
    color: #0e0e10;
    font-weight: 700;
  }
  .cat-tab:not(.active) {
    background: var(--surface);
    border-color: var(--border);
    color: var(--muted);
  }
  .cat-tab:not(.active):hover { border-color: var(--muted); color: var(--text); }

  /* Calendar grid */
  .calendar-wrap {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .cal-header-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .cal-header-row span {
    text-align: center;
    padding: 12px 4px;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 500;
  }
  .cal-header-row span:first-child { color: var(--accent2); }
  .cal-header-row span:last-child { color: var(--accent2); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
  }
  .cal-cell {
    background: var(--surface);
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    min-height: 44px;
    gap: 3px;
  }
  .cal-cell:hover { background: var(--surface2); }
  .cal-cell.empty { cursor: default; background: var(--bg); }
  .cal-cell .day-num {
    font-size: 14px;
    font-weight: 500;
    line-height: 1;
    z-index: 1;
    position: relative;
  }
  .cal-cell.today .day-num {
    font-weight: 700;
    color: var(--accent);
  }
  .cal-cell.checked {
    background: color-mix(in srgb, var(--cell-color, var(--accent)) 18%, var(--surface));
  }
  .cal-cell.checked .day-num { color: var(--cell-color, var(--accent)); font-weight: 700; }
  .cal-cell.today.checked .day-num {
    color: var(--cell-color, var(--accent));
  }
  .check-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--cell-color, var(--accent));
    opacity: 0.8;
  }
  .cal-cell.checked .check-dot { opacity: 1; }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 12px;
    text-align: center;
  }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* Progress bar */
  .progress-section { margin-bottom: 28px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--muted);
  }
  .progress-label strong { color: var(--text); font-size: 13px; }
  .progress-track {
    background: var(--surface2);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* All habits summary */
  .habits-summary { margin-bottom: 24px; }
  .habit-row {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 12px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .habit-row:hover { border-color: var(--muted); }
  .habit-row.active-row { border-color: var(--row-color, var(--accent)); }
  .habit-color-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .habit-name { flex: 1; font-size: 14px; font-weight: 500; }
  .habit-mini-bar {
    flex: 2;
    background: var(--surface2);
    border-radius: 3px;
    height: 4px;
    overflow: hidden;
  }
  .habit-mini-fill { height: 100%; border-radius: 3px; }
  .habit-pct {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    min-width: 36px;
    text-align: right;
  }
  .habit-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.2s;
  }
  .habit-del:hover { color: var(--accent2); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    width: 90%;
    max-width: 360px;
    transform: translateY(16px);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
  .modal input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .modal input[type="text"]:focus { border-color: var(--accent); }
  .color-picker-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected { border-color: #fff; transform: scale(1.15); }
  .modal-actions { display: flex; gap: 10px; }
  .btn {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #9585fc; }
  .btn-secondary { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-secondary:hover { color: var(--text); border-color: var(--muted); }

  /* Empty state */
  .empty-hint {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 20px;
    border: 1px dashed var(--border);
    border-radius: 14px;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="app-title">HABIT LOG</div>
  <div class="month-nav">
    <button id="prevMonth">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button id="nextMonth">›</button>
  </div>
</div>

<!-- Category tabs -->
<div class="category-section">
  <div class="category-header">
    <span class="section-label">Habits</span>
    <button class="add-category-btn" id="addHabitBtn">+ 추가</button>
  </div>
  <div class="category-tabs" id="categoryTabs"></div>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-value" id="statChecked" style="color: var(--accent)">0</div>
    <div class="stat-label">완료일</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="statRate" style="background: linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">0%</div>
    <div class="stat-label">성공률</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="statStreak" style="color: var(--accent4)">0</div>
    <div class="stat-label">연속 일수</div>
  </div>
</div>

<!-- Progress -->
<div class="progress-section">
  <div class="progress-label">
    <strong id="progressHabitName">-</strong>
    <span id="progressText">이번달 진행</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<!-- Calendar -->
<div class="calendar-wrap">
  <div class="cal-header-row">
    <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- All habits summary -->
<div class="habits-summary">
  <div class="section-label" style="margin-bottom:10px;">이번달 전체 현황</div>
  <div id="habitsList"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>새 습관 추가</h3>
    <input type="text" id="habitNameInput" placeholder="습관 이름 (예: 운동, 독서)" maxlength="15">
    <div class="section-label" style="margin-bottom:8px;">색상 선택</div>
    <div class="color-picker-row" id="colorPicker"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modalCancel">취소</button>
      <button class="btn btn-primary" id="modalConfirm">추가</button>
    </div>
  </div>
</div>

<script>
const COLORS = [
  '#7c6dfa','#fa6d9a','#6dfabc','#facc6d','#6db8fa','#fa9b6d','#d06dfa','#6dfad0','#fae06d','#fa6d6d'
];

const STORAGE_KEY = 'habitlog_v2';
let state = loadState();

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth(); // 0-indexed
let selectedHabitId = state.habits.length > 0 ? state.habits[0].id : null;

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return {
    habits: [
      { id: 'h1', name: '운동', color: '#7c6dfa' },
      { id: 'h2', name: '독서', color: '#fa6d9a' },
      { id: 'h3', name: '루틴', color: '#6dfabc' },
    ],
    checks: {}
  };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function checkKey(habitId, year, month, day) {
  return `${habitId}_${year}_${month+1}_${day}`;
}

function isChecked(habitId, year, month, day) {
  return !!state.checks[checkKey(habitId, year, month, day)];
}

function toggleCheck(habitId, year, month, day) {
  const k = checkKey(habitId, year, month, day);
  if (state.checks[k]) delete state.checks[k];
  else state.checks[k] = true;
  saveState();
  render();
}

function getDaysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}

function getFirstDayOfWeek(year, month) {
  return new Date(year, month, 1).getDay(); // 0=Sun
}

function getStreak(habitId) {
  const today = new Date();
  let streak = 0;
  let d = new Date(today);
  while (true) {
    if (isChecked(habitId, d.getFullYear(), d.getMonth(), d.getDate())) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else break;
  }
  return streak;
}

function getMonthRate(habitId, year, month) {
  const today = new Date();
  const days = getDaysInMonth(year, month);
  const isCurrentMonth = (year === today.getFullYear() && month === today.getMonth());
  const maxDay = isCurrentMonth ? today.getDate() : days;
  let count = 0;
  for (let d = 1; d <= maxDay; d++) {
    if (isChecked(habitId, year, month, d)) count++;
  }
  return maxDay > 0 ? Math.round(count / maxDay * 100) : 0;
}

function renderTabs() {
  const tabs = document.getElementById('categoryTabs');
  tabs.innerHTML = '';
  state.habits.forEach(h => {
    const tab = document.createElement('div');
    tab.className = 'cat-tab' + (selectedHabitId === h.id ? ' active' : '');
    tab.style.setProperty('--cell-color', h.color);
    if (selectedHabitId === h.id) {
      tab.style.background = h.color;
      tab.style.borderColor = h.color;
    }
    tab.textContent = h.name;
    tab.onclick = () => { selectedHabitId = h.id; render(); };
    tabs.appendChild(tab);
  });
  if (state.habits.length === 0) {
    tabs.innerHTML = '<span style="color:var(--muted);font-size:13px;">습관을 추가해보세요</span>';
  }
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const days = getDaysInMonth(currentYear, currentMonth);
  const firstDay = getFirstDayOfWeek(currentYear, currentMonth);
  const today = new Date();
  const habit = state.habits.find(h => h.id === selectedHabitId);

  // Empty cells
  for (let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell empty';
    grid.appendChild(cell);
  }

  for (let d = 1; d <= days; d++) {
    const cell = document.createElement('div');
    const isToday = (today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === d);
    const checked = habit ? isChecked(habit.id, currentYear, currentMonth, d) : false;

    cell.className = 'cal-cell' + (isToday ? ' today' : '') + (checked ? ' checked' : '');
    if (habit) {
      cell.style.setProperty('--cell-color', habit.color);
    }

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    const dot = document.createElement('div');
    dot.className = 'check-dot';
    cell.appendChild(dot);

    if (habit) {
      cell.onclick = () => toggleCheck(habit.id, currentYear, currentMonth, d);
    }

    grid.appendChild(cell);
  }
}

function renderStats() {
  const habit = state.habits.find(h => h.id === selectedHabitId);
  if (!habit) {
    document.getElementById('statChecked').textContent = '—';
    document.getElementById('statRate').textContent = '—';
    document.getElementById('statStreak').textContent = '—';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('progressHabitName').textContent = '-';
    return;
  }

  const days = getDaysInMonth(currentYear, currentMonth);
  const today = new Date();
  let checkedCount = 0;
  for (let d = 1; d <= days; d++) {
    if (isChecked(habit.id, currentYear, currentMonth, d)) checkedCount++;
  }

  const isCurrentMonth = (currentYear === today.getFullYear() && currentMonth === today.getMonth());
  const elapsed = isCurrentMonth ? today.getDate() : days;
  const rate = elapsed > 0 ? Math.round(checkedCount / elapsed * 100) : 0;
  const streak = getStreak(habit.id);

  document.getElementById('statChecked').textContent = checkedCount;
  document.getElementById('statChecked').style.color = habit.color;
  document.getElementById('statRate').textContent = rate + '%';
  document.getElementById('statStreak').textContent = streak;
  document.getElementById('progressFill').style.width = rate + '%';
  document.getElementById('progressFill').style.background = `linear-gradient(90deg, ${habit.color}, ${habit.color}99)`;
  document.getElementById('progressHabitName').textContent = habit.name;
  document.getElementById('progressText').textContent = `${checkedCount}일 / ${elapsed}일 기준`;
}

function renderHabitsList() {
  const list = document.getElementById('habitsList');
  list.innerHTML = '';
  if (state.habits.length === 0) {
    list.innerHTML = '<div class="empty-hint">아직 습관이 없어요.<br>위에서 추가해보세요 ✦</div>';
    return;
  }
  state.habits.forEach(h => {
    const rate = getMonthRate(h.id, currentYear, currentMonth);
    const row = document.createElement('div');
    row.className = 'habit-row' + (selectedHabitId === h.id ? ' active-row' : '');
    row.style.setProperty('--row-color', h.color);

    row.innerHTML = `
      <div class="habit-color-dot" style="background:${h.color}"></div>
      <div class="habit-name">${h.name}</div>
      <div class="habit-mini-bar">
        <div class="habit-mini-fill" style="width:${rate}%;background:${h.color}"></div>
      </div>
      <div class="habit-pct" style="color:${h.color}">${rate}%</div>
      <button class="habit-del" data-id="${h.id}" title="삭제">×</button>
    `;
    row.querySelector('.habit-del').onclick = (e) => {
      e.stopPropagation();
      if (confirm(`"${h.name}" 습관을 삭제할까요?`)) {
        state.habits = state.habits.filter(x => x.id !== h.id);
        if (selectedHabitId === h.id) selectedHabitId = state.habits.length ? state.habits[0].id : null;
        saveState();
        render();
      }
    };
    row.onclick = () => { selectedHabitId = h.id; render(); };
    list.appendChild(row);
  });
}

function render() {
  const d = new Date(currentYear, currentMonth, 1);
  document.getElementById('monthLabel').textContent =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}`;
  renderTabs();
  renderCalendar();
  renderStats();
  renderHabitsList();
}

// Month nav
document.getElementById('prevMonth').onclick = () => {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  render();
};
document.getElementById('nextMonth').onclick = () => {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  render();
};

// Modal
let selectedColor = COLORS[0];
function buildColorPicker() {
  const cp = document.getElementById('colorPicker');
  cp.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c === selectedColor ? ' selected' : '');
    sw.style.background = c;
    sw.onclick = () => {
      selectedColor = c;
      buildColorPicker();
    };
    cp.appendChild(sw);
  });
}

document.getElementById('addHabitBtn').onclick = () => {
  document.getElementById('habitNameInput').value = '';
  selectedColor = COLORS[state.habits.length % COLORS.length];
  buildColorPicker();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('habitNameInput').focus(), 100);
};
document.getElementById('modalCancel').onclick = () => {
  document.getElementById('modalOverlay').classList.remove('open');
};
document.getElementById('modalOverlay').onclick = (e) => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
};
document.getElementById('modalConfirm').onclick = () => {
  const name = document.getElementById('habitNameInput').value.trim();
  if (!name) { document.getElementById('habitNameInput').focus(); return; }
  const id = 'h' + Date.now();
  state.habits.push({ id, name, color: selectedColor });
  selectedHabitId = id;
  saveState();
  document.getElementById('modalOverlay').classList.remove('open');
  render();
};
document.getElementById('habitNameInput').onkeydown = (e) => {
  if (e.key === 'Enter') document.getElementById('modalConfirm').click();
};

render();
</script>
</body>
</html>
